name: Validate Architecture 2.0

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository data and manifests
        run: python3 tools/validate_repository.py

      - name: Prove implemented support matrix is current
        run: python3 tools/build_support_matrix.py --check

      - name: Prove audio operator backlog is current
        run: python3 tools/build_audio_backlog.py --check

      - name: Prove Object IR operator universe is current
        run: python3 tools/build_operator_universe.py --check

      - name: Prove generated PCM Wave A batch is current
        run: python3 tools/scaffold_pcm_wave_a.py --check

      - name: Prove all-Capsule performance harness is current
        run: python3 tools/build_performance_harness.py --check

      - name: Test performance scoring rules
        run: python3 tools/test_benchmark_scoring.py

      - name: Check Capsule dependency boundaries
        run: python3 tools/check_capsule_independence.py

      - name: Prove Capsules build after copy-out and Adapter deletion
        run: python3 tools/check_capsule_independence.py --cargo

      - name: Test thin Kernel and protocol
        run: cargo test --locked --manifest-path kernel/Cargo.toml

      - name: Discover and test every Adapter through Kernel defaults
        run: python3 tools/test_adapters.py

      - name: Benchmark and score every production Capsule capability
        run: python3 tools/benchmark_capsules.py --output /tmp/everythingx-performance.json --print-report
