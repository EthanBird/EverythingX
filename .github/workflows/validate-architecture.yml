name: Validate Architecture 2.0

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository data and manifests
        run: python3 tools/validate_repository.py

      - name: Prove implemented support matrix is current
        run: python3 tools/build_support_matrix.py --check

      - name: Prove audio operator backlog is current
        run: python3 tools/build_audio_backlog.py --check

      - name: Prove Object IR operator universe is current
        run: python3 tools/build_operator_universe.py --check

      - name: Check Capsule dependency boundaries
        run: python3 tools/check_capsule_independence.py capsules/_template capsules/utf16-to-utf8 capsules/bmp-to-png capsules/wav-pcm-to-aiff

      - name: Prove Capsules build after copy-out and Adapter deletion
        run: python3 tools/check_capsule_independence.py --cargo capsules/_template capsules/utf16-to-utf8 capsules/bmp-to-png capsules/wav-pcm-to-aiff

      - name: Test thin Kernel and protocol
        run: cargo test --locked --manifest-path kernel/Cargo.toml

      - name: Build optional template Adapter separately
        run: cargo test --manifest-path capsules/_template/everythingx/adapter/Cargo.toml

      - name: Test UTF-16 Adapter through Kernel defaults
        run: cargo test --manifest-path capsules/utf16-to-utf8/everythingx/adapter/Cargo.toml

      - name: Test BMP Adapter through Kernel defaults
        run: cargo test --manifest-path capsules/bmp-to-png/everythingx/adapter/Cargo.toml

      - name: Test WAV PCM Adapter through Kernel defaults
        run: cargo test --manifest-path capsules/wav-pcm-to-aiff/everythingx/adapter/Cargo.toml
