name: Rebuild format catalog

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/rebuild-catalog.yml"
      - "tools/**"
      - "sources/sources.json"

permissions:
  contents: write

concurrency:
  group: rebuild-format-catalog
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch locked source snapshots
        run: python3 tools/sync_sources.py --destination ../research/raw

      - name: Build normalized catalog
        run: python3 tools/build_catalog.py --source-root ../research/raw

      - name: Validate repository
        run: python3 tools/validate_repository.py

      - name: Prove image operator backlog is current
        run: python3 tools/build_image_backlog.py --check

      - name: Prove generated Raster Wave A batch is current
        run: python3 tools/scaffold_raster_wave_a.py --check

      - name: Prove generated and evidenced PNG Wave B batch is current
        run: python3 tools/scaffold_png_wave_b.py --check

      - name: Commit generated catalog when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog
          if git diff --cached --quiet; then
            echo "Catalog is already current."
          else
            git commit -m "Rebuild format catalog"
            git push
          fi
