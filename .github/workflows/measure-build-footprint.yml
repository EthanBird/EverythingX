name: Measure Rust build footprint

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/measure-build-footprint.yml"
      - "tools/measure_build_footprint.py"

permissions:
  contents: write

concurrency:
  group: measure-rust-build-footprint
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust with the minimal profile
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -Vv
          cargo -V

      - name: Measure cold, warm and standalone build footprints
        id: measure
        run: |
          set +e
          python3 tools/measure_build_footprint.py \
            --json benchmarks/build-footprint/latest.json \
            --markdown benchmarks/build-footprint/latest.md \
            > /tmp/everythingx-build-footprint.log 2>&1
          status=$?
          set -e
          mkdir -p benchmarks/build-footprint
          tail -n 240 /tmp/everythingx-build-footprint.log > benchmarks/build-footprint/workflow.log
          printf '{"exit_code":%s,"run_id":"%s","commit_sha":"%s"}\n' \
            "$status" "$GITHUB_RUN_ID" "$GITHUB_SHA" \
            > benchmarks/build-footprint/workflow-status.json
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat /tmp/everythingx-build-footprint.log

      - name: Commit build report or failure diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/build-footprint
          if git diff --cached --quiet; then
            echo "Build footprint report is unchanged."
          else
            if [ "${{ steps.measure.outputs.exit_code }}" = "0" ]; then
              git commit -m "Record Rust build footprint"
            else
              git commit -m "Record Rust build footprint failure"
            fi
            git push
          fi

      - name: Fail after publishing diagnostics
        if: steps.measure.outputs.exit_code != '0'
        run: exit 1
